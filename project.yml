name: Audiswift
options:
  bundleIdPrefix: com.openaudio
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Audiswift
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    AUDIUS_API_KEY: "$(AUDIUS_API_KEY)"

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

targets:
  Audiswift:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openaudio.audiswift
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    entitlements:
      path: Resources/Audiswift.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    dependencies:
      - sdk: MediaPlayer.framework

